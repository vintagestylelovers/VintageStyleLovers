name: Aggiorna catalogo da TeePublic

on:
  schedule:
    # Ogni giorno alle 06:00 UTC (08:00 ora italiana in inverno, 07:00 in estate)
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # permette di lanciarlo anche a mano dal tab "Actions"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scarica i design aggiornati da TeePublic
        run: python3 scrape_teepublic.py

      - name: Salva le modifiche nel repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json
          git diff --quiet --cached || git commit -m "Aggiornamento automatico catalogo TeePublic"
          git push

      - name: Prepara il sito per GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Pubblica su GitHub Pages
        uses: actions/deploy-pages@v4
